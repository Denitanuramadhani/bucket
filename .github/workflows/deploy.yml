          username: nitaaa21
          password: dnT4b1j4R*D0k3r
          repository: nitaaa21/ololeo-bucket
          tag: frontend
          context: .
          push: true
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: 43.134.117.194
          username: ubuntu
          password: lh9bUplI(tr^-+X&
          port: 22
          script: |
            cd ~/app/ololeo-bucket
            bash redeploy-landing-page.sh
    