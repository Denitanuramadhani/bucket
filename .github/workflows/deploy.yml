name: CI/CD Ololeo Bucket Website

on:
  push:
    branches: [ main ]
#make me a workflow to deploy to docker hub and then SSH with appleboy to run a script to pull and run the container
#
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build the application
        run: npm run build
      - name: Deploy to Docker Hub
        uses: docker/build-push-action@v2
